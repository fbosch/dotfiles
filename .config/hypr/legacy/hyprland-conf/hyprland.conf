################
### DEBUGGING ###
################

debug {
    disable_logs = true
    enable_stdout_logs = false
}

xwayland {
  force_zero_scaling = true
}

opengl {
  nvidia_anti_flicker = true
}

render {
  direct_scanout = false
}

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = uwsm-app -s s -- mullvad-exclude wezterm
$fileManager = uwsm-app -s s -- nemo
$browser = bash ~/.config/hypr/scripts/launch-browser.sh
$menu = vicinae toggle

####################
### CONFIG FILES ###
####################

# Machine-specific monitor config (optional - suppresses error if file missing)
# Copy from monitors.conf.example if needed

# hyprlang noerror true
source = ~/.config/hypr/monitors.conf
# hyprlang noerror false

# See https://wiki.hypr.land/Configuring/Monitors/
# Fallback if monitors.conf doesn't exist
monitor=,preferred,auto,1

# Keep workspace 1 and 10 on DP-2
workspace = 1, monitor:DP-2, default:true
workspace = 10, monitor:DP-2

source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/rules.conf

# hyprlang noerror true
source = ~/.config/hypr/window-state-rules.conf
# hyprlang noerror false

#################
### AUTOSTART ###
#################

source = ~/.config/hypr/autostart.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################

source = ~/.config/hypr/environment.conf

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#    enforce_permissions = 1
# }
#
# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

source = ~/.config/hypr/appearance.conf

#############
### INPUT ###
#############

source = ~/.config/hypr/input.conf
