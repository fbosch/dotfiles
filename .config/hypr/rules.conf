windowrule = match:class ^(wiremix_terminal)$, float on
windowrule = match:class ^(wiremix_terminal)$, pin on
windowrule = match:class ^(wiremix_terminal)$, no_anim on
windowrule = size 725 500, match:class ^(wiremix_terminal)$
windowrule = match:class ^(wiremix_terminal)$, move (monitor_w-window_w-45) (monitor_h-window_h-50)

# ==========================================
