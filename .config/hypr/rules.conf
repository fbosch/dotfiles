windowrule = match:title ^([Pp]icture-in-[Pp]icture)$, pin on
windowrule = match:title ([Pp]icture-in-[Pp]icture), animation slide right

windowrule = size 688 388, match:initial_title (^(Picture-in-Picture)$)
windowrule = move 2739 993, match:initial_title (^(Picture-in-Picture)$)

# ===========================================
# Floorp Browser
